name: Claude AI Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
  # claude-code-action authenticates via OIDC and needs this.
  id-token: write
jobs:
  claude-review:
    runs-on: ubuntu-latest
    env:
      # Uses a Claude Pro/Max subscription token (not a billed API key).
      # Generate locally with `claude setup-token`.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Skips cleanly until CLAUDE_CODE_OAUTH_TOKEN is configured, so PRs are
      # not blocked before the secret is added.
      - name: Claude AI review
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for bugs, security issues, performance
            problems, and adherence to the project's conventions (TypeScript,
            English-only code and copy, TDD with real assertions).

            Always leave a visible review on the PR:
            - Post specific, concrete problems as inline comments on the lines
              they affect.
            - Then ALWAYS post exactly one short summary comment on the PR, even
              when the change is clean — briefly state what you checked and that
              it looks good. The `gh` CLI is authenticated; find the PR number
              from the GitHub context (e.g. `gh pr view --json number`) and use
              `gh pr comment <number> --body "..."`.

            Do not nitpick style that the linter already enforces.
