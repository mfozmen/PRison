name: Claude AI Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
jobs:
  claude-review:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Skips cleanly until ANTHROPIC_API_KEY is configured, so PRs are not
      # blocked before the secret is added.
      - name: Claude AI review
        if: env.ANTHROPIC_API_KEY != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for bugs, security issues, performance
            problems, and adherence to the project's conventions (TypeScript,
            English-only code and copy, TDD with real assertions). Post concise
            inline comments on concrete issues only. If the change looks good,
            say so briefly. Do not nitpick style that the linter already enforces.
