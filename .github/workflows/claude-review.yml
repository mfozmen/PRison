name: Claude AI Review
on:
  pull_request:
    types: [opened, synchronize]
permissions:
  contents: read
  pull-requests: write
jobs:
  claude-review:
    runs-on: ubuntu-latest
    env:
      # Uses a Claude Pro/Max subscription token (not a billed API key).
      # Generate locally with `claude setup-token`.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Skips cleanly until CLAUDE_CODE_OAUTH_TOKEN is configured, so PRs are
      # not blocked before the secret is added.
      - name: Claude AI review
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for bugs, security issues, performance
            problems, and adherence to the project's conventions (TypeScript,
            English-only code and copy, TDD with real assertions). Post concise
            inline comments on concrete issues only. If the change looks good,
            say so briefly. Do not nitpick style that the linter already enforces.
